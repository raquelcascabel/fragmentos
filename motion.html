  <script>
    const ITEMS = [

    ITEMS.forEach(item => {
      const figure = document.createElement('figure');
      figure.className = 'clip-figure';
      figure.appendChild(createClickToPlayVideo(item.url, { height: 320, lightbox: true, alt: item.caption }));

      caption.textContent = item.caption;
      figure.appendChild(caption);
      clipGrid.appendChild(figure);
