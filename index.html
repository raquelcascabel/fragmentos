<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raquel Bello Patricio — AI Content Creator, Video Editor & Motion Graphics</title>
<meta name="description" content="Portfolio de Raquel Bello Patricio: edición de vídeo, motion graphics, VFX y creación de contenido con IA. Un recorrido interactivo en 3D por sus proyectos.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.raquelbellocreative.com/">
<meta property="og:title" content="Raquel Bello Patricio — AI Content Creator, Video Editor & Motion Graphics">
<meta property="og:description" content="Portfolio interactivo en 3D: edición de vídeo, motion graphics, VFX y creación de contenido con IA.">
<meta property="og:image" content="https://res.cloudinary.com/dfaijs7v3/video/upload/so_1,q_auto,f_auto/v1783965539/video_web_rhy1uv.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Raquel Bello Patricio — AI Content Creator, Video Editor & Motion Graphics">
<meta name="twitter:description" content="Portfolio interactivo en 3D: edición de vídeo, motion graphics, VFX y creación de contenido con IA.">
<meta name="twitter:image" content="https://res.cloudinary.com/dfaijs7v3/video/upload/so_1,q_auto,f_auto/v1783965539/video_web_rhy1uv.jpg">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="adaptive-video.js"></script>
<style>
  :root {
    --bg: #080D1A;
    --accent: #3ECFB2;
    --text: #E8ECF4;
    --text-dim: #6E7A90;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- pantalla de carga ---------- */
  #loader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.4rem;
    z-index: 3;
    transition: opacity 0.6s ease;
  }

  #loader.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader-ring {
    width: 44px;
    height: 44px;
    border: 1px solid rgba(232, 236, 244, 0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loader-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ---------- vídeo ---------- */
  #introVideo {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #introVideo.visible {
    opacity: 1;
  }

  /* ---------- saltar intro ---------- */
  #skipIntro {
    position: fixed;
    bottom: 5vh;
    right: 6vw;
    z-index: 4;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid rgba(232, 236, 244, 0.2);
    padding: 0.6rem 1.1rem;
    opacity: 0;
    transition: opacity 0.5s ease, color 0.3s ease, border-color 0.3s ease;
  }

  #skipIntro.visible { opacity: 1; }

  #skipIntro:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ---------- botón de sonido ---------- */
  #soundToggle {
    position: fixed;
    bottom: 5vh;
    left: 6vw;
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: 1px solid rgba(232, 236, 244, 0.2);
    padding: 0.6rem 1.1rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s ease, color 0.3s ease, border-color 0.3s ease;
  }

  #soundToggle.visible { opacity: 1; }

  #soundToggle:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>

  <div id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Cargando...</div>
  </div>

  <!--
    PON AQUÍ TU VÍDEO: cambia INTRO_VIDEO_URL más abajo en el script
    por tu enlace de Cloudinary.
  -->
  <video
    id="introVideo"
    muted
    playsinline
    preload="auto"
  ></video>

  <a href="fragmentos-cristal.html" id="skipIntro">Saltar intro →</a>
  <button id="soundToggle" type="button"><span id="soundIcon">🔇</span> Sonido</button>

<script>
  // A dónde va una vez termina el vídeo (o si el usuario pulsa "Saltar intro")
  const DESTINO = 'fragmentos-cristal.html';
  const INTRO_VIDEO_URL = 'https://res.cloudinary.com/dfaijs7v3/video/upload/v1783965539/video_web_rhy1uv.mp4';

  const loader = document.getElementById('loader');
  const video = document.getElementById('introVideo');
  const skipLink = document.getElementById('skipIntro');
  const soundToggle = document.getElementById('soundToggle');
  const soundIcon = document.getElementById('soundIcon');
  skipLink.setAttribute('href', DESTINO);

  let usedFallback = false;

  function loadFallback() {
    if (usedFallback) {
      // la versión de reserva también ha fallado: no dejamos a nadie atascado
      goToDestino();
      return;
    }
    usedFallback = true;
    video.src = buildMp4Url(INTRO_VIDEO_URL);
  }

  video.src = buildResponsiveFullscreenUrl(INTRO_VIDEO_URL);

  soundToggle.addEventListener('click', () => {
    video.muted = !video.muted;
    soundIcon.textContent = video.muted ? '🔇' : '🔊';
  });

  let started = false;

  function playIntro() {
    if (started) return;
    started = true;
    loader.classList.add('hidden');
    video.classList.add('visible');
    video.play().catch(() => {
      // si el navegador bloquea el autoplay, pasamos directo a la web
      goToDestino();
    });
    setTimeout(() => {
      skipLink.classList.add('visible');
      soundToggle.classList.add('visible');
    }, 1200);
  }

  // arrancamos en cuanto hay suficiente para empezar (no esperamos a tener
  // todo el vídeo buffereado, así se percibe mucho más rápido)
  video.addEventListener('canplay', playIntro, { once: true });

  // por si tarda demasiado en cargar, arrancamos igualmente a los 4s
  setTimeout(playIntro, 4000);

  // si la versión recortada para móvil falla por lo que sea, probamos con
  // la versión normal antes de rendirnos del todo
  video.addEventListener('error', loadFallback);

  video.addEventListener('ended', goToDestino);

  function goToDestino() {
    window.location.href = DESTINO;
  }
</script>
</body>
</html>
