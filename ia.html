<style>
  .clip-grid {
    display: flex;

  .clip-figure { margin: 0; text-align: center; }
  .clip-figure .ctp-video { border: 1px solid rgba(232, 236, 244, 0.18); box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5); }
  .clip-figure figcaption {
    margin-top: 0.6rem;

    color: var(--text-dim);
  }
  .project-link {
    display: block;

    text-decoration: none;
  }

  .project-frame {
    width: 100%;
    max-width: 940px;
    margin: 0 auto;

    border: 1px solid rgba(232, 236, 244, 0.14);
    background: rgba(8, 13, 26, 0.32);
  }

<body>
  <div id="crystalBg" aria-hidden="true"></div>

  <a class="back-link" href="fragmentos-cristal.html#sec-ia"><span>←</span> Volver al recorrido</a>

  <header>
    <div class="eyebrow">03 — IA</div>
    <h1>El vacío también tiene textura</h1>
  </header>

  <div id="projectGroups"></div>

  <article>
    <p>Dos formas distintas de trabajar con IA en el proceso creativo.</p>
  </article>

  <footer>Raquel Bello · IA</footer>

  <script>
    // Mini-cristal facetado: misma silueta bipiramidal irregular (punta
    // corta arriba, punta larga abajo, corona de facetas) que los
    // cristales 3D de la página principal, en miniatura, para crear
    // continuidad visual entre el recorrido y las páginas de sección.
    let __mcCount = 0;
    function miniCrystalSVG() {
      const gid = 'mcg' + (__mcCount++);
      return '<svg class="mini-crystal" viewBox="0 0 22 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="#8B7FF5"/>' +
        '<stop offset="55%" stop-color="#E8ECF4"/>' +
        '<stop offset="100%" stop-color="#6952D6"/>' +
        '</linearGradient></defs>' +
        '<polygon points="11,2 16,13 11,15 6,13" fill="url(#' + gid + ')" opacity="0.92"/>' +
        '<polygon points="6,13 11,15 8,32" fill="url(#' + gid + ')" opacity="0.8"/>' +
        '<polygon points="11,15 16,13 14,31 8,32" fill="url(#' + gid + ')" opacity="0.65"/>' +
        '<polygon points="14,31 16,13 19,15 11,15" fill="url(#' + gid + ')" opacity="0.5"/>' +
        '<path class="facet-edge" d="M11,2 L6,13 M11,2 L16,13 M6,13 L11,15 M16,13 L11,15 M6,13 L8,32 M11,15 L8,32 M11,15 L14,31 M16,13 L14,31"/>' +
        '</svg>';
    }

    const PROJECT_GROUPS = [
      {
        project: 'El murciélago Pip',
        items: [
          {
            url: 'https://res.cloudinary.com/dfaijs7v3/video/upload/q_auto:best/vc_auto/v1780663838/nueva_portada_cuento_sin_logo_qopxjl.mp4',
            caption: '"El murciélago Pip y la noche oscura" — cuento interactivo con ilustración propia animada mediante IA (Vidu).',
            link: { url: 'https://raquelcascabel.github.io/cuentoelmurcielagopipylanocheoscura/', label: 'Ver el cuento completo →' }
          }
        ]
      },
      {
        project: 'Avatar animado',
        items: [
          {
            url: 'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784130503/avtar_fy2iti.mp4',
            caption: 'Animación de avatar generada con IA (Dola/Vidu), montada en Premiere.'
          }
        ]
      }
    ];

    const container = document.getElementById('projectGroups');
    PROJECT_GROUPS.forEach(group => {
      const divider = document.createElement('div');
      divider.className = 'group-divider';
      divider.innerHTML = '<span class="group-label">Proyecto — <strong>' + group.project + '</strong></span>';
      container.appendChild(divider);

      const frame = document.createElement('div');
      frame.className = 'project-frame';

      const block = document.createElement('div');
      block.className = 'group-block clip-grid';
      group.items.forEach(item => {
        const figure = document.createElement('figure');
        figure.className = 'clip-figure';
        figure.appendChild(createClickToPlayVideo(item.url, { height: 320, lightbox: true, alt: item.caption }));
        const caption = document.createElement('figcaption');
        caption.textContent = item.caption;
        figure.appendChild(caption);
        if (item.link) {
          const link = document.createElement('a');
          link.className = 'project-link';
          link.href = item.link.url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.textContent = item.link.label;
          figure.appendChild(link);
        }
        block.appendChild(figure);
      });
      frame.appendChild(block);
      container.appendChild(frame);
    });
  </script>
</body>
