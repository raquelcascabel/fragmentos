<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creación de Contenido con IA — Raquel Bello Patricio</title>
<meta name="description" content="Proyectos con inteligencia artificial de Raquel Bello Patricio: el cuento interactivo El murciélago Pip y la noche oscura, y animación de avatar generada con IA.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.raquelbellocreative.com/ia.html">
<meta property="og:title" content="Creación de Contenido con IA — Raquel Bello Patricio">
<meta property="og:description" content="El cuento interactivo El murciélago Pip y la noche oscura, y animación de avatar generada con IA.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Creación de Contenido con IA — Raquel Bello Patricio">
<meta name="twitter:description" content="El cuento interactivo El murciélago Pip y la noche oscura, y animación de avatar generada con IA.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="pagina-seccion.css">
<script src="adaptive-video.js"></script>
<style>
  .clip-grid {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 1.6rem;
    max-width: 900px;
    margin-bottom: 1.4rem;
  }
  .clip-figure { margin: 0; }
  .clip-figure .ctp-video { border: 1px solid rgba(232, 236, 244, 0.14); }
  .clip-figure figcaption {
    margin-top: 0.6rem;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--text-dim);
  }
  .project-link {
    display: block;
    margin-top: 0.7rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
  }
  .project-link:hover { opacity: 0.75; }
</style>
</head>
<body>
  <a class="back-link" href="fragmentos-cristal.html#sec-ia"><span>←</span> Volver al recorrido</a>

  <header>
    <div class="eyebrow">03 — IA</div>
    <h1>El vacío también tiene textura</h1>
  </header>

  <div class="clip-grid" id="clipGrid"></div>

  <article>
    <p>Dos formas distintas de trabajar con IA en el proceso creativo.</p>
  </article>

  <footer>Raquel Bello · IA</footer>

  <script>
    const ITEMS = [
      {
        url: 'https://res.cloudinary.com/dfaijs7v3/video/upload/q_auto:best/vc_auto/v1780663838/nueva_portada_cuento_sin_logo_qopxjl.mp4',
        caption: '"El murciélago Pip y la noche oscura" — cuento interactivo con ilustración propia animada mediante IA (Vidu).',
        link: { url: 'https://raquelcascabel.github.io/cuentoelmurcielagopipylanocheoscura/', label: 'Ver el cuento completo →' }
      },
      {
        url: 'https://res.cloudinary.com/dfaijs7v3/video/upload/v1783965539/video_web_rhy1uv.mp4',
        caption: 'Animación de avatar generada con IA (Dola/Vidu), montada en Premiere.'
      }
    ];
    const clipGrid = document.getElementById('clipGrid');
    ITEMS.forEach(item => {
      const figure = document.createElement('figure');
      figure.className = 'clip-figure';
      figure.appendChild(createClickToPlayVideo(item.url, { height: 320, lightbox: true, alt: item.caption }));
      const caption = document.createElement('figcaption');
      caption.textContent = item.caption;
      figure.appendChild(caption);
      if (item.link) {
        const link = document.createElement('a');
        link.className = 'project-link';
        link.href = item.link.url;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = item.link.label;
        figure.appendChild(link);
      }
      clipGrid.appendChild(figure);
    });
  </script>
</body>
</html>
