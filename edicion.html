<style>
  .clip-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 1rem;
    max-width: 900px;
    margin: 0 auto;
  }
  .clip-grid .ctp-video {
    border: 1px solid rgba(232, 236, 244, 0.18);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
  }
</style>

<body>
  <div id="crystalBg" aria-hidden="true"></div>

  <a class="back-link" href="fragmentos-cristal.html#sec-edicion"><span>←</span> Volver al recorrido</a>

  <header>
    <div class="eyebrow">01 — Edición</div>
    <h1>Lo que se rompe, se multiplica</h1>
  </header>

  <!-- Cada clip se muestra como miniatura + botón de play; el vídeo real
       solo se carga cuando alguien hace clic. Admite vídeos verticales
       y horizontales mezclados: el ancho se ajusta solo a cada uno.
       Los clips se agrupan por cliente, separados por un divisor. -->
  <div id="clientGroups"></div>

  <article>
    <p>Piezas creadas en la agencia Amor de Madre para clientes como EWS y NZI: grabación, montaje y rótulos propios, pensados para captar la atención en redes desde el primer segundo.</p>
  </article>

  <footer>Raquel Bello · Edición</footer>

  <script>
    // Mini-cristal facetado: misma silueta bipiramidal irregular (punta
    // corta arriba, punta larga abajo, corona de facetas) que los
    // cristales 3D de la página principal, en miniatura, para crear
    // continuidad visual entre el recorrido y las páginas de sección.
    let __mcCount = 0;
    function miniCrystalSVG() {
      const gid = 'mcg' + (__mcCount++);
      return '<svg class="mini-crystal" viewBox="0 0 22 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="#8B7FF5"/>' +
        '<stop offset="55%" stop-color="#E8ECF4"/>' +
        '<stop offset="100%" stop-color="#6952D6"/>' +
        '</linearGradient></defs>' +
        '<polygon points="11,2 16,13 11,15 6,13" fill="url(#' + gid + ')" opacity="0.92"/>' +
        '<polygon points="6,13 11,15 8,32" fill="url(#' + gid + ')" opacity="0.8"/>' +
        '<polygon points="11,15 16,13 14,31 8,32" fill="url(#' + gid + ')" opacity="0.65"/>' +
        '<polygon points="14,31 16,13 19,15 11,15" fill="url(#' + gid + ')" opacity="0.5"/>' +
        '<path class="facet-edge" d="M11,2 L6,13 M11,2 L16,13 M6,13 L11,15 M16,13 L11,15 M6,13 L8,32 M11,15 L8,32 M11,15 L14,31 M16,13 L14,31"/>' +
        '</svg>';
    }

    const CLIENT_GROUPS = [
      {
        client: 'EWS',
        clips: [
          'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784111529/EWS_ver01_dic3_m9vcco.mov',
          'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784111446/EWS_ver6_dic1_onsfqh.mov',
          'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784111434/EWS_ver2_dic2_mdtfhr.mov'
        ]
      },
      {
        client: 'NZI',
        clips: [
          'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784111902/nzi_universe_5_lqmlfx.mov'
        ]
      }
    ];

    const container = document.getElementById('clientGroups');
    CLIENT_GROUPS.forEach(group => {
      const divider = document.createElement('div');
      divider.className = 'group-divider';
      divider.innerHTML = miniCrystalSVG() + '<span class="group-label">Cliente — <strong>' + group.client + '</strong></span>' + miniCrystalSVG();
      container.appendChild(divider);

      const block = document.createElement('div');
      block.className = 'group-block clip-grid';
      group.clips.forEach((url, i) => block.appendChild(createClickToPlayVideo(url, { height: 320, lightbox: true, alt: 'Clip de edición para ' + group.client + ' ' + (i + 1) + ', haz clic para reproducir' })));
      container.appendChild(block);
    });
  </script>
</body>
