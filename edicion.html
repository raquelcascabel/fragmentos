<style>
  .clip-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 2rem;
    max-width: 900px;
    margin: 0 auto;
  }
  .clip-grid .ctp-video {
    border: 1px solid rgba(232, 236, 244, 0.18);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
  }
  .agency-panel {
    width: 100%;
    max-width: 900px;
    margin: 1.8rem auto 0;
    padding: 1.4rem 1.8rem;
    border-radius: 16px;
    border: 1px solid rgba(232, 236, 244, 0.14);
    background: rgba(8, 13, 26, 0.32);
  }
  .agency-panel p {
    font-size: 0.95rem;
    line-height: 1.75;
    color: #B9C2D4;
    margin: 0;
    text-align: center;
  }
  @media (max-width: 640px) {
    .agency-panel { padding: 1.1rem 1.3rem; margin-top: 1.3rem; }

<body>
  <div id="crystalBg" aria-hidden="true"></div>

  <a class="back-link" href="fragmentos-cristal.html#sec-edicion"><span>←</span> Volver al recorrido</a>

  <header>
    <div class="eyebrow">01 — Edición</div>
    <h1>Lo que se rompe, se multiplica</h1>
  </header>

  <!-- Cada clip se muestra como miniatura + botón de play; el vídeo real
       solo se carga cuando alguien hace clic. Admite vídeos verticales
       y horizontales mezclados: el ancho se ajusta solo a cada uno.
       Los clips se agrupan por cliente, separados por un divisor. -->
  <div id="clientGroups"></div>

  <article>
    <p>Piezas de edición para las agencias Acutebrand y Amor de Madre (clientes EWS y NZI): grabación, montaje y rótulos propios, pensados para captar la atención en redes desde el primer segundo.</p>
  </article>

  <footer>Raquel Bello · Edición</footer>

  <script>
    // Mini-cristal facetado: misma silueta bipiramidal irregular (punta
    // corta arriba, punta larga abajo, corona de facetas) que los
    // cristales 3D de la página principal, en miniatura, para crear
    // continuidad visual entre el recorrido y las páginas de sección.
    let __mcCount = 0;
    function miniCrystalSVG() {
      const gid = 'mcg' + (__mcCount++);
      return '<svg class="mini-crystal" viewBox="0 0 22 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
        '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="#8B7FF5"/>' +
        '<stop offset="55%" stop-color="#E8ECF4"/>' +
        '<stop offset="100%" stop-color="#6952D6"/>' +
        '</linearGradient></defs>' +
        '<polygon points="11,2 16,13 11,15 6,13" fill="url(#' + gid + ')" opacity="0.92"/>' +
        '<polygon points="6,13 11,15 8,32" fill="url(#' + gid + ')" opacity="0.8"/>' +
        '<polygon points="11,15 16,13 14,31 8,32" fill="url(#' + gid + ')" opacity="0.65"/>' +
        '<polygon points="14,31 16,13 19,15 11,15" fill="url(#' + gid + ')" opacity="0.5"/>' +
        '<path class="facet-edge" d="M11,2 L6,13 M11,2 L16,13 M6,13 L11,15 M16,13 L11,15 M6,13 L8,32 M11,15 L8,32 M11,15 L14,31 M16,13 L14,31"/>' +
        '</svg>';
    }

    const AGENCY_GROUPS = [
      {
        agency: 'Acutebrand',
        description: 'Contenido para redes sociales en varios formatos (vertical, cuadrado y horizontal), pensado para una publicación ágil en distintas plataformas.',
        clients: [
          {
            client: null,
            clips: [
              'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784564755/EDIT_Master_9x16._vyefqp.mp4',
              'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784564753/EDIT_Master_1X1._xfaksx.mp4',
              'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784566675/EDIT_Master_16x9_comprimido_tfugh9.mp4'
            ]
          }
        ]
      },
      {
        agency: 'Amor de Madre',
        description: 'Piezas de edición para clientes de la agencia, como NZI y EWS: grabación, montaje y rótulos propios, con foco en captar la atención desde el primer segundo.',
        clients: [
          {
            client: 'NZI',
            clips: [
              'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784111902/nzi_universe_5_lqmlfx.mov'
            ]
          },
          {
            client: 'EWS',
            clips: [
              'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784111529/EWS_ver01_dic3_m9vcco.mov',
              'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784111446/EWS_ver6_dic1_onsfqh.mov',
              'https://res.cloudinary.com/dfaijs7v3/video/upload/v1784111434/EWS_ver2_dic2_mdtfhr.mov'
            ]
          }
        ]
      }
    ];

    const container = document.getElementById('clientGroups');
    let clipCounter = 0;
    AGENCY_GROUPS.forEach(agencyGroup => {
      const agencyDivider = document.createElement('div');
      agencyDivider.className = 'group-divider';
      agencyDivider.innerHTML = miniCrystalSVG() + '<span class="group-label">Agencia — <strong>' + agencyGroup.agency + '</strong></span>';
      container.appendChild(agencyDivider);

      agencyGroup.clients.forEach(group => {
        if (group.client) {
          const divider = document.createElement('div');
          divider.className = 'group-divider group-divider--client';
          divider.innerHTML = '<span class="group-label">Cliente — <strong>' + group.client + '</strong></span>';
          container.appendChild(divider);
        }

        const block = document.createElement('div');
        block.className = 'group-block clip-grid';
        const labelBase = group.client || agencyGroup.agency;
        group.clips.forEach((url) => {
          clipCounter++;
          block.appendChild(createClickToPlayVideo(url, { height: 320, lightbox: true, alt: 'Clip de edición para ' + labelBase + ', vídeo ' + clipCounter + ', haz clic para reproducir' }));
        });
        container.appendChild(block);
      });

      if (agencyGroup.description) {
        const panel = document.createElement('div');
        panel.className = 'agency-panel';
        panel.innerHTML = '<p>' + agencyGroup.description + '</p>';
        container.appendChild(panel);
      }
    });
  </script>
</body>
</html>
